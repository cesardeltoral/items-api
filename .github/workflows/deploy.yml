name: Deploy to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create source zip
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "*bin/*" \
            --exclude "*obj/*" \
            --exclude "publish-profile.xml" \
            --exclude ".github/*"

      - name: Deploy to Azure via Kudu
        run: |
          curl -X POST \
            https://items-api-cesar-36.scm.azurewebsites.net/api/zipdeploy \
            --user "${{ secrets.AZURE_WEBAPP_USERNAME }}:${{ secrets.AZURE_WEBAPP_PASSWORD }}" \
            --data-binary @deploy.zip \
            -H "Content-Type: application/octet-stream" \
            --fail \
            -w "\nHTTP Status: %{http_code}\n"
